<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Date?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:       #c0475e;
      --rose-dark:  #9b3349;
      --rose-soft:  #f5e6e9;
      --rose-pale:  #fdf2f4;
      --cream:      #fdf8f4;
      --ink:        #2c1e1e;
      --ink-mid:    #6b4f4f;
      --ink-light:  #a07878;
      --latte:      #e8d5c4;
      --card-bg:    #fffcfa;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle dot pattern background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #d4b8a8 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.25;
      pointer-events: none;
    }

    .page {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 3.5rem 3rem;
      text-align: center;
      max-width: 440px;
      width: 100%;
      border: 1px solid rgba(192, 71, 94, 0.1);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.8) inset,
        0 24px 64px rgba(192, 71, 94, 0.1),
        0 4px 16px rgba(44, 30, 30, 0.06);
      position: relative;
    }

    /* decorative corner lines */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--rose);
      border-style: solid;
      opacity: 0.25;
    }
    .card::before { top: 16px; left: 16px; border-width: 1.5px 0 0 1.5px; border-radius: 4px 0 0 0; }
    .card::after  { bottom: 16px; right: 16px; border-width: 0 1.5px 1.5px 0; border-radius: 0 0 4px 0; }

    /* SVG Coffee icon */
    .coffee-wrap {
      width: 72px;
      height: 72px;
      background: var(--rose-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: gentlebob 3s ease-in-out infinite;
    }
    @keyframes gentlebob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    .coffee-wrap svg { width: 36px; height: 36px; }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 0.6rem;
    }

    .sub {
      font-size: 16px;
      color: var(--ink-light);
      margin-bottom: 2.5rem;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: linear-gradient(to right, transparent, var(--rose), transparent);
      margin: 0 auto 2.5rem;
    }

    .btn-row { display: flex; gap: 14px; justify-content: center; }

    .btn-yes {
      background: var(--rose);
      color: #fff;
      border: none;
      padding: 14px 38px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(192, 71, 94, 0.35), 0 1px 4px rgba(192, 71, 94, 0.2);
    }
    .btn-yes:hover { background: var(--rose-dark); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(192, 71, 94, 0.4); }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      background: transparent;
      color: var(--ink-light);
      border: 1px solid var(--latte);
      padding: 14px 38px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      position: fixed;
      user-select: none;
      white-space: nowrap;
      z-index: 999;
      backdrop-filter: blur(8px);
      background: rgba(253, 248, 244, 0.85);
    }

    /* ── Calendar ── */
    #calendar-card { display: none; }
    #calendar-card.show { display: block; }

    .cal-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.5rem; }
    .cal-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; color: var(--ink); margin-bottom: 0.4rem; }
    .cal-sub { font-size: 14px; color: var(--ink-light); margin-bottom: 2rem; font-family: 'Playfair Display', serif; font-style: italic; }

    .section-label { font-size: 11px; font-weight: 600; color: var(--ink-mid); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.75rem; }

    .day-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }

    .day-btn {
      padding: 16px 6px;
      border-radius: 14px;
      border: 1px solid var(--latte);
      background: var(--cream);
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .day-btn span { display: block; font-size: 12px; color: var(--ink-light); font-weight: 400; margin-top: 3px; }
    .day-btn:hover { border-color: var(--rose); background: var(--rose-pale); color: var(--rose); }
    .day-btn.sel { border-color: var(--rose); background: var(--rose); color: #fff; box-shadow: 0 4px 14px rgba(192, 71, 94, 0.3); }
    .day-btn.sel span { color: rgba(255,255,255,0.75); }

    .time-section { display: none; }
    .time-section.show { display: block; }
    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.75rem; }

    .time-btn {
      padding: 11px 4px;
      border-radius: 10px;
      border: 1px solid var(--latte);
      background: var(--cream);
      color: var(--ink-mid);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .time-btn:hover { border-color: var(--rose); background: var(--rose-pale); color: var(--rose); }
    .time-btn.sel { border-color: var(--rose); background: var(--rose); color: #fff; }

    .confirm-btn {
      width: 100%;
      padding: 15px;
      background: var(--rose);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s, opacity 0.2s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(192, 71, 94, 0.35);
    }
    .confirm-btn:hover:not(:disabled) { background: var(--rose-dark); transform: translateY(-1px); }
    .confirm-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    /* ── Success ── */
    #success-card { display: none; }
    #success-card.show { display: block; }

    .success-icon {
      width: 72px; height: 72px;
      background: #edf7f0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
      animation: pop 0.5s cubic-bezier(0.17,0.89,0.32,1.28) both;
    }
    @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .success-icon svg { width: 34px; height: 34px; }

    .success-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #3a9e65; margin-bottom: 0.6rem; }
    .success-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 500; color: var(--ink); margin-bottom: 0.6rem; }
    .success-detail { font-size: 15px; color: var(--ink-light); line-height: 1.75; margin-bottom: 1.5rem; font-family: 'Playfair Display', serif; font-style: italic; }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 20px;
      background: #edf7f0;
      color: #2a7a4e;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
    }
    .badge svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

<div class="page">

  <!-- Invite -->
  <div class="card" id="invite-card">
    <div class="coffee-wrap" aria-hidden="true">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- steam -->
        <path d="M13 6 Q14 3.5 13 1" stroke="#c0475e" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M18 6 Q19 3.5 18 1" stroke="#c0475e" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M23 6 Q24 3.5 23 1" stroke="#c0475e" stroke-width="1.5" stroke-linecap="round"/>
        <!-- cup -->
        <path d="M8 10h20l-2.5 14a2 2 0 01-2 1.7H12.5a2 2 0 01-2-1.7L8 10z" fill="#f5e6e9" stroke="#c0475e" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- handle -->
        <path d="M28 13.5 Q34 13.5 34 18 Q34 22.5 28 22.5" stroke="#c0475e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- saucer -->
        <path d="M5 27.5 Q18 30 31 27.5" stroke="#c0475e" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <p class="eyebrow">A little confession</p>
    <h1>I think you<br><em>are cute</em></h1>
    <div class="divider"></div>
    <p class="sub">Want to grab coffee with me?</p>

    <div class="btn-row">
      <button class="btn-yes" onclick="showCalendar()">Yes, let's do it</button>
      <button class="btn-no" id="btn-no">No</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="card" id="calendar-card">
    <div class="coffee-wrap" aria-hidden="true" style="animation:none; background:#f5e6e9;">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="28" height="23" rx="3" fill="#f5e6e9" stroke="#c0475e" stroke-width="1.5"/>
        <path d="M4 14h28" stroke="#c0475e" stroke-width="1.5"/>
        <path d="M11 4v6M25 4v6" stroke="#c0475e" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="22" r="1.5" fill="#c0475e"/>
        <circle cx="18" cy="22" r="1.5" fill="#c0475e"/>
        <circle cx="24" cy="22" r="1.5" fill="#c0475e"/>
      </svg>
    </div>

    <p class="cal-eyebrow">Wonderful</p>
    <p class="cal-title">Pick your perfect day</p>
    <p class="cal-sub">I'll be there, no matter what</p>

    <p class="section-label">Day</p>
    <div class="day-grid" id="day-grid"></div>

    <div class="time-section" id="time-section">
      <p class="section-label">Time</p>
      <div class="time-grid" id="time-grid"></div>
    </div>

    <button class="confirm-btn" id="confirm-btn" disabled onclick="confirmDate()">Confirm our coffee date</button>
  </div>

  <!-- Success -->
  <div class="card" id="success-card">
    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="13" fill="#edf7f0" stroke="#3a9e65" stroke-width="1.5"/>
        <path d="M10 17.5l5 5 9-9" stroke="#3a9e65" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="success-eyebrow">It's happening</p>
    <p class="success-title">It's a date</p>
    <p class="success-detail" id="success-detail"></p>
    <span class="badge">
      <svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3.5" stroke="#2a7a4e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Saved
    </span>
  </div>

</div>

<script>
  var selectedDay = null;
  var selectedTime = null;
  var noBtn = document.getElementById('btn-no');

  function initNoBtn() {
    var row = document.querySelector('.btn-row');
    var rect = row.getBoundingClientRect();
    var btnW = noBtn.offsetWidth;
    var btnH = noBtn.offsetHeight;
    noBtn.style.left = (rect.right - btnW) + 'px';
    noBtn.style.top  = (rect.top + (rect.height - btnH) / 2) + 'px';
  }

  function runAway() {
    var margin = 16;
    var btnW = noBtn.offsetWidth;
    var btnH = noBtn.offsetHeight;
    var maxX = window.innerWidth  - btnW - margin;
    var maxY = window.innerHeight - btnH - margin;
    noBtn.style.left = (Math.random() * maxX + margin) + 'px';
    noBtn.style.top  = (Math.random() * maxY + margin) + 'px';
  }

  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); runAway(); }, { passive: false });
  noBtn.addEventListener('click', function(e){ e.preventDefault(); runAway(); });

  window.addEventListener('load', function(){ setTimeout(initNoBtn, 50); });
  window.addEventListener('resize', initNoBtn);

  function getDates() {
    var days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var today  = new Date();
    var toFri  = (5 - today.getDay() + 7) % 7 || 7;
    return [0,1,2].map(function(offset){
      var d = new Date(today);
      d.setDate(today.getDate() + toFri + offset);
      return { label: days[d.getDay()], date: months[d.getMonth()] + ' ' + d.getDate(), full: d.toDateString() };
    });
  }

  var times = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM'];

  function showCalendar() {
    document.getElementById('invite-card').style.display = 'none';
    noBtn.style.display = 'none';

    var calCard = document.getElementById('calendar-card');
    calCard.classList.add('show');

    var dayGrid = document.getElementById('day-grid');
    getDates().forEach(function(d){
      var btn = document.createElement('button');
      btn.className = 'day-btn';
      btn.innerHTML = d.label + '<span>' + d.date + '</span>';
      btn.onclick = function(){
        dayGrid.querySelectorAll('.day-btn').forEach(function(b){ b.classList.remove('sel'); });
        btn.classList.add('sel');
        selectedDay = d;
        document.getElementById('time-section').classList.add('show');
        checkConfirm();
      };
      dayGrid.appendChild(btn);
    });

    var timeGrid = document.getElementById('time-grid');
    times.forEach(function(t){
      var btn = document.createElement('button');
      btn.className = 'time-btn';
      btn.textContent = t;
      btn.onclick = function(){
        timeGrid.querySelectorAll('.time-btn').forEach(function(b){ b.classList.remove('sel'); });
        btn.classList.add('sel');
        selectedTime = t;
        checkConfirm();
      };
      timeGrid.appendChild(btn);
    });
  }

  function checkConfirm() {
    document.getElementById('confirm-btn').disabled = !(selectedDay && selectedTime);
  }

  function confirmDate() {
    var booking = { day: selectedDay.full, time: selectedTime, confirmedAt: new Date().toISOString() };
    try { localStorage.setItem('coffeeDate', JSON.stringify(booking)); } catch(e) {}

    document.getElementById('calendar-card').classList.remove('show');
    document.getElementById('calendar-card').style.display = 'none';

    document.getElementById('success-card').classList.add('show');
    document.getElementById('success-detail').innerHTML =
      selectedDay.label + ', ' + selectedDay.date + ' at ' + selectedTime;
  }
</script>
</body>
</html>
